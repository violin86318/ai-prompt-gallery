<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Gallery</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="/ai-prompt-gallery/static/css/style.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">
                <i class="ph-fill ph-sparkle"></i>
                Prompt Gallery
            </h1>
            <p class="subtitle">A visual collection of curated AI prompts</p>
        </div>
    </header>

    <main class="gallery-container">
        
        <div class="empty-state">
            <i class="ph ph-images empty-icon"></i>
            <h2>No prompts found</h2>
            <p>Try selecting a different tag or check your data source.</p>
        </div>
        
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="ph-fill ph-check-circle"></i> Prompt copied to clipboard!
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="/ai-prompt-gallery/static/js/main.js"></script>
</body>

</html>
